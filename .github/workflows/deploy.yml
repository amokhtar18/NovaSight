# NovaSight Deployment Pipeline
# ==============================
# Automated deployment to staging and production environments

name: Deploy

# PAUSED - Re-enable triggers below to resume
# on:
#   push:
#     branches: [main]
#   workflow_dispatch:
#     inputs:
#       environment:
#         description: 'Environment to deploy to'
#         required: true
#         default: 'staging'
#         type: choice
#         options:
#           - staging
#           - production
#       skip_tests:
#         description: 'Skip running tests before deployment'
#         required: false
#         default: false
#         type: boolean
on:
  workflow_dispatch: # Manual trigger only while paused

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Only allow one deployment at a time per environment
concurrency:
  group: deploy-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

jobs:
  # ============================================
  # Pre-deployment Validation
  # ============================================
  validate:
    name: Pre-deployment Validation
    runs-on: ubuntu-latest
    outputs:
      should_deploy_staging: ${{ steps.check.outputs.staging }}
      should_deploy_production: ${{ steps.check.outputs.production }}
      image_tag: ${{ steps.check.outputs.image_tag }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Determine deployment targets
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
              echo "staging=false" >> $GITHUB_OUTPUT
              echo "production=true" >> $GITHUB_OUTPUT
            else
              echo "staging=true" >> $GITHUB_OUTPUT
              echo "production=false" >> $GITHUB_OUTPUT
            fi
          else
            # Push to main auto-deploys to staging
            echo "staging=true" >> $GITHUB_OUTPUT
            echo "production=false" >> $GITHUB_OUTPUT
          fi
          echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT
      
      - name: Verify Docker images exist
        run: |
          echo "Verifying images for tag: ${{ steps.check.outputs.image_tag }}"
          # In production, verify images exist in registry before deploying

  # ============================================
  # Deploy to Staging
  # ============================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.should_deploy_staging == 'true'
    environment:
      name: staging
      url: https://staging.novasight.io
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure kubectl for Staging
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}
      
      - name: Create namespace if not exists
        run: |
          kubectl create namespace novasight-staging --dry-run=client -o yaml | kubectl apply -f -
      
      - name: Deploy Backend to Staging
        run: |
          kubectl set image deployment/backend \
            backend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ needs.validate.outputs.image_tag }} \
            -n novasight-staging || \
          echo "Backend deployment not found, will be created by Helm/manifest"
      
      - name: Deploy Frontend to Staging
        run: |
          kubectl set image deployment/frontend \
            frontend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ needs.validate.outputs.image_tag }} \
            -n novasight-staging || \
          echo "Frontend deployment not found, will be created by Helm/manifest"
      
      - name: Wait for Backend rollout
        run: |
          kubectl rollout status deployment/backend -n novasight-staging --timeout=300s
        continue-on-error: true
      
      - name: Wait for Frontend rollout
        run: |
          kubectl rollout status deployment/frontend -n novasight-staging --timeout=300s
        continue-on-error: true
      
      - name: Run database migrations
        run: |
          kubectl exec -n novasight-staging deployment/backend -- \
            flask db upgrade || echo "Migration failed or not applicable"
      
      - name: Run smoke tests
        run: |
          echo "Running smoke tests against staging..."
          sleep 30
          
          # Health check
          curl --fail --retry 5 --retry-delay 10 \
            https://staging.novasight.io/api/v1/health || exit 1
          
          # Frontend check
          curl --fail --retry 5 --retry-delay 10 \
            https://staging.novasight.io || exit 1
          
          echo "✅ Smoke tests passed!"
      
      - name: Notify staging deployment
        if: always()
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "✅ Staging deployment successful: ${{ needs.validate.outputs.image_tag }}"
          else
            echo "❌ Staging deployment failed: ${{ needs.validate.outputs.image_tag }}"
          fi

  # ============================================
  # Deploy to Production
  # ============================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [validate, deploy-staging]
    if: |
      always() && 
      needs.validate.outputs.should_deploy_production == 'true' &&
      (needs.deploy-staging.result == 'success' || needs.deploy-staging.result == 'skipped')
    environment:
      name: production
      url: https://novasight.io
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure kubectl for Production
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_PRODUCTION }}
      
      - name: Pre-deployment backup
        run: |
          echo "Creating pre-deployment backup..."
          # In production, this would trigger database backup
          # kubectl exec -n novasight-prod deployment/backend -- flask db-backup create
      
      - name: Deploy Backend to Production (Blue-Green)
        run: |
          # Update image
          kubectl set image deployment/backend \
            backend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ needs.validate.outputs.image_tag }} \
            -n novasight-prod
          
          # Wait for rollout with extended timeout for production
          kubectl rollout status deployment/backend -n novasight-prod --timeout=600s
      
      - name: Deploy Frontend to Production (Blue-Green)
        run: |
          # Update image
          kubectl set image deployment/frontend \
            frontend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ needs.validate.outputs.image_tag }} \
            -n novasight-prod
          
          # Wait for rollout
          kubectl rollout status deployment/frontend -n novasight-prod --timeout=600s
      
      - name: Run database migrations
        run: |
          kubectl exec -n novasight-prod deployment/backend -- \
            flask db upgrade
      
      - name: Run production smoke tests
        run: |
          echo "Running production smoke tests..."
          sleep 30
          
          # Health check
          curl --fail --retry 5 --retry-delay 10 \
            https://novasight.io/api/v1/health || exit 1
          
          # Frontend check
          curl --fail --retry 5 --retry-delay 10 \
            https://novasight.io || exit 1
          
          echo "✅ Production smoke tests passed!"
      
      - name: Rollback on failure
        if: failure()
        run: |
          echo "🔄 Rolling back production deployment..."
          kubectl rollout undo deployment/backend -n novasight-prod
          kubectl rollout undo deployment/frontend -n novasight-prod
          kubectl rollout status deployment/backend -n novasight-prod --timeout=300s
          kubectl rollout status deployment/frontend -n novasight-prod --timeout=300s
          echo "✅ Rollback completed"
      
      - name: Notify production deployment
        if: always()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ job.status == 'success' && '✅' || '❌' }} *NovaSight Production Deployment*"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Status:*\n${{ job.status }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n${{ github.sha }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Deployed by:*\n${{ github.actor }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.ref_name }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

  # ============================================
  # Post-deployment Verification
  # ============================================
  post-deploy-verification:
    name: Post-deployment Verification
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always() && (needs.deploy-staging.result == 'success' || needs.deploy-production.result == 'success')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run post-deployment health checks
        run: |
          echo "Running comprehensive health checks..."
          
          # Determine which environment was deployed
          if [[ "${{ needs.deploy-production.result }}" == "success" ]]; then
            BASE_URL="https://novasight.io"
            ENV="production"
          else
            BASE_URL="https://staging.novasight.io"
            ENV="staging"
          fi
          
          echo "Checking $ENV environment at $BASE_URL"
          
          # API health
          curl --fail "$BASE_URL/api/v1/health" && echo "✅ API health check passed"
          
          # Database connectivity
          curl --fail "$BASE_URL/api/v1/health/db" && echo "✅ Database check passed" || echo "⚠️ Database check not available"
          
          # Redis connectivity
          curl --fail "$BASE_URL/api/v1/health/redis" && echo "✅ Redis check passed" || echo "⚠️ Redis check not available"
      
      - name: Create deployment record
        run: |
          echo "📝 Deployment Record"
          echo "===================="
          echo "Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Deployed by: ${{ github.actor }}"
          echo "Staging: ${{ needs.deploy-staging.result }}"
          echo "Production: ${{ needs.deploy-production.result }}"
