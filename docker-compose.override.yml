# NovaSight Development Overrides
# =================================
# This file contains development-specific overrides
# It's automatically loaded by docker-compose

services:
  # ============================================
  # Backend - Development Mode (Flask + Dagster via supervisord)
  # ============================================
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      SEED_USERS: "true"
      SEED_PASSWORD: "NovaSight@2026"
    volumes:
      - ./backend:/app
      - ./docker/backend/entrypoint.sh:/entrypoint.sh
    # Use supervisord to run Flask + Dagster together
    command: supervisord -c /etc/supervisor/conf.d/supervisord.conf

  # ============================================
  # Frontend - Development Mode with HMR
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
