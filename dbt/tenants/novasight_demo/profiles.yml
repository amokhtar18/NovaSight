novasight_novasight_demo:
  target: dev
  outputs:
    dev:
      type: clickhouse
      schema: dbt_tenant_novasight_demo
      host: clickhouse
      port: 9000
      user: default
      password: ''
      secure: false
      verify: false
    prod:
      type: clickhouse
      schema: dbt_tenant_novasight_demo
      host: '{{ env_var(''CLICKHOUSE_HOST'') }}'
      port: '{{ env_var(''CLICKHOUSE_PORT'', 8123) | int }}'
      user: '{{ env_var(''CLICKHOUSE_USER'') }}'
      password: '{{ env_var(''CLICKHOUSE_PASSWORD'') }}'
      secure: true
      verify: true
