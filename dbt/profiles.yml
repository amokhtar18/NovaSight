# NOTE on the ClickHouse port:
# The dbt-clickhouse adapter speaks the HTTP protocol on port 8123. The rest
# of the NovaSight platform (clickhouse-driver / native protocol) uses 9000,
# which is what `CLICKHOUSE_PORT` is set to in docker-compose. We therefore
# resolve the dbt-side port from `DBT_CLICKHOUSE_PORT` first and fall back to
# 8123 -- we deliberately do NOT read `CLICKHOUSE_PORT` here so that running
# `dbt run` directly inside the backend container works out of the box.
novasight:
  target: "{{ env_var('DBT_TARGET', 'dev') }}"
  outputs:
    # =========================================================================
    # All dbt Studio models materialize into the tenant's ClickHouse database.
    #
    # Iceberg / Lake data is read from the tenant's S3 bucket via ClickHouse's
    # native ``iceberg(...)`` table function — there is no separate DuckDB /
    # lake materialization target. ClickHouse is the single source of truth
    # for all model outputs (staging views, intermediate ephemeral CTEs, marts
    # tables).
    # =========================================================================
    dev:
      type: clickhouse
      schema: "{{ env_var('TENANT_DATABASE', 'default') }}"
      host: "{{ env_var('CLICKHOUSE_HOST', 'localhost') }}"
      port: "{{ env_var('DBT_CLICKHOUSE_PORT', '8123') | int }}"
      user: "{{ env_var('CLICKHOUSE_USER', 'default') }}"
      password: "{{ env_var('CLICKHOUSE_PASSWORD', '') }}"
      secure: false
      verify: false

    prod:
      type: clickhouse
      schema: "{{ env_var('TENANT_DATABASE') }}"
      host: "{{ env_var('CLICKHOUSE_HOST') }}"
      port: "{{ env_var('DBT_CLICKHOUSE_PORT', '8123') | int }}"
      user: "{{ env_var('CLICKHOUSE_USER') }}"
      password: "{{ env_var('CLICKHOUSE_PASSWORD') }}"
      secure: true
      verify: true

    # Backward-compatibility aliases. These previously pointed at a
    # dbt-duckdb / Iceberg target; they now resolve to the same ClickHouse
    # configuration so any orchestration code passing ``--target lake`` or
    # ``--target warehouse`` continues to work without code changes.
    lake:
      type: clickhouse
      schema: "{{ env_var('TENANT_DATABASE', 'default') }}"
      host: "{{ env_var('CLICKHOUSE_HOST', 'localhost') }}"
      port: "{{ env_var('DBT_CLICKHOUSE_PORT', '8123') | int }}"
      user: "{{ env_var('CLICKHOUSE_USER', 'default') }}"
      password: "{{ env_var('CLICKHOUSE_PASSWORD', '') }}"
      secure: false
      verify: false

    warehouse:
      type: clickhouse
      schema: "{{ env_var('TENANT_DATABASE', 'default') }}"
      host: "{{ env_var('CLICKHOUSE_HOST', 'localhost') }}"
      port: "{{ env_var('DBT_CLICKHOUSE_PORT', '8123') | int }}"
      user: "{{ env_var('CLICKHOUSE_USER', 'default') }}"
      password: "{{ env_var('CLICKHOUSE_PASSWORD', '') }}"
      secure: false
      verify: false
