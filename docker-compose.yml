# NovaSight Development Environment
# ==================================
# Docker Compose configuration for local development
# 
# Usage:
#   docker-compose up -d                    # Start all services
#   docker-compose up -d postgres redis     # Start specific services
#   docker-compose logs -f backend          # View logs
#   docker-compose down                     # Stop all services
#   docker-compose down -v                  # Stop and remove volumes

services:
  # ============================================
  # PostgreSQL - Metadata Store
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: novasight-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: novasight
      POSTGRES_PASSWORD: novasight
      POSTGRES_DB: novasight_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novasight -d novasight_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - novasight-network

  # ============================================
  # ClickHouse - Data Warehouse
  # ============================================
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: novasight-clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native interface
    environment:
      CLICKHOUSE_DB: novasight
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infrastructure/clickhouse/config:/etc/clickhouse-server/config.d
      - ./docker/clickhouse/users.xml:/etc/clickhouse-server/users.d/users.xml
      - ./docker/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - novasight-network

  # ============================================
  # Redis - Caching & Session Store
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: novasight-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - novasight-network

  # ============================================
  # MinIO - S3-compatible Object Storage
  # ============================================
  minio:
    image: minio/minio:latest
    container_name: novasight-minio
    restart: unless-stopped
    ports:
      - "9002:9000"   # S3 API (host 9002 to avoid conflict with ClickHouse native on 9000)
      - "9001:9001"   # MinIO Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
      - ./docker/minio/init-buckets.sh:/docker-entrypoint-initdb.d/init-buckets.sh:ro
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - novasight-network

  # ============================================
  # Ollama - Local LLM
  # ============================================
  ollama:
    image: ollama/ollama:latest
    container_name: novasight-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          memory: 4G
    networks:
      - novasight-network

  # ============================================
  # Apache Superset (OPTIONAL — profile: superset)
  # ============================================
  # Reuses the existing `postgres` (separate logical DB `superset`),
  # the existing `redis` (db indices 2-5), and the per-tenant
  # `clickhouse` databases (registered automatically by NovaSight's
  # tenant lifecycle hook).
  #
  # Start with:
  #   docker compose --profile superset up -d superset superset-mcp
  superset:
    image: apache/superset:6.0.0
    container_name: novasight-superset
    restart: unless-stopped
    profiles: ["superset"]
    ports:
      - "8088:8088"
    environment:
      # Make NovaSight's superset_config.py importable (mounted under /app).
      PYTHONPATH: /app
      SUPERSET_CONFIG_PATH: /app/app/domains/analytics/superset/superset_config.py
      # Shared infrastructure (re-uses existing services)
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: novasight
      POSTGRES_PASSWORD: novasight
      SUPERSET_DB_NAME: superset
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Secrets
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-dev-superset-secret-change-me}
      JWT_SECRET_KEY: jwt-dev-secret-key-change-in-production
    volumes:
      # Mount the NovaSight backend so superset_config.py + the bridge
      # package are importable. Read-only because Superset must not
      # mutate NovaSight code.
      - ./backend:/app:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - novasight-network

  # ============================================
  # superset-mcp (Aptro) — MCP server in front of Superset
  # ============================================
  # Configured / health-checked from the AI Workbench UI at /app/query.
  superset-mcp:
    image: ghcr.io/aptro/superset-mcp:latest
    container_name: novasight-superset-mcp
    restart: unless-stopped
    profiles: ["superset"]
    ports:
      - "8090:8080"
    environment:
      SUPERSET_BASE_URL: http://superset:8088
      SUPERSET_USERNAME: ${SUPERSET_ADMIN_USERNAME:-admin}
      SUPERSET_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin}
    depends_on:
      - superset
    networks:
      - novasight-network

  # ============================================
  # NovaSight Backend API (with Dagster)
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: novasight-backend
    restart: unless-stopped
    ports:
      - "5000:5000"    # Flask API
      - "3000:3000"    # Dagster Webserver
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: "1"
      APP_ENV: development
      DATABASE_URL: postgresql://novasight:novasight@postgres:5432/novasight_platform
      REDIS_URL: redis://redis:6379/0
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 9000
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      SECRET_KEY: dev-secret-key-change-in-production
      JWT_SECRET_KEY: jwt-dev-secret-key-change-in-production
      CREDENTIAL_ENCRYPTION_KEY: novasight-encryption-key-32byte!
      # Dagster Configuration (Primary Orchestrator)
      DAGSTER_HOME: /app/orchestration
      DAGSTER_POSTGRES_URL: postgresql://novasight:novasight@postgres:5432/dagster
      DAGSTER_HOST: localhost
      DAGSTER_PORT: 3000
      DAGSTER_GRAPHQL_URL: http://localhost:3000/graphql
      DAGSTER_MAX_CONCURRENT_RUNS: 10
      DAGSTER_DBT_CONCURRENCY_LIMIT: 2
      DAGSTER_DLT_CONCURRENCY_LIMIT: 5
      DAGSTER_COMPUTE_LOGS_DIR: /var/dagster/logs
      # Dagster resources configuration
      DBT_PROJECT_DIR: /app/dbt
      DBT_PROFILES_DIR: /app/dbt
      # MinIO / Object Storage (for Iceberg data lake)
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_ENDPOINT_URL: http://minio:9000
      S3_DEFAULT_REGION: us-east-1
      # Iceberg Catalog
      ICEBERG_CATALOG_URL: postgresql://novasight:novasight@postgres:5432/novasight_platform
      # Superset integration (set SUPERSET_ENABLED=true to activate)
      SUPERSET_ENABLED: ${SUPERSET_ENABLED:-false}
      SUPERSET_BASE_URL: ${SUPERSET_BASE_URL:-http://superset:8088}
      SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME:-admin}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin}
      SUPERSET_MCP_URL: ${SUPERSET_MCP_URL:-http://superset-mcp:8080}
    volumes:
      - ./backend:/app
      - ./dbt:/app/dbt
      - dlt_pipelines:/opt/dlt/pipelines
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - novasight-network

  # ============================================
  # NovaSight Frontend
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: novasight-frontend
    restart: unless-stopped
    ports:
      - "4000:5173"
    environment:
      # Empty VITE_API_URL so API calls use relative URLs through the Vite proxy
      # (avoids cross-origin requests from :4000 to :5000)
      VITE_API_URL: ""
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - novasight-network

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
    name: novasight-postgres-data
  clickhouse_data:
    name: novasight-clickhouse-data
  redis_data:
    name: novasight-redis-data
  ollama_data:
    name: novasight-ollama-data
  minio_data:
    name: novasight-minio-data
  dlt_pipelines:
    name: novasight-dlt-pipelines

# ============================================
# Networks
# ============================================
networks:
  novasight-network:
    name: novasight-network
    driver: bridge
