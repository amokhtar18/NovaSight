# NovaSight Development Environment
# ==================================
# Docker Compose configuration for local development
# 
# Usage:
#   docker-compose up -d                    # Start all services
#   docker-compose up -d postgres redis     # Start specific services
#   docker-compose logs -f backend          # View logs
#   docker-compose down                     # Stop all services
#   docker-compose down -v                  # Stop and remove volumes

services:
  # ============================================
  # PostgreSQL - Metadata Store
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: novasight-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: novasight
      POSTGRES_PASSWORD: novasight
      POSTGRES_DB: novasight_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novasight -d novasight_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - novasight-network

  # ============================================
  # ClickHouse - Data Warehouse
  # ============================================
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: novasight-clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native interface
    environment:
      CLICKHOUSE_DB: novasight
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infrastructure/clickhouse/config:/etc/clickhouse-server/config.d
      - ./docker/clickhouse/users.xml:/etc/clickhouse-server/users.d/users.xml
      - ./docker/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - novasight-network

  # ============================================
  # Redis - Caching & Session Store
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: novasight-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - novasight-network

  # ============================================
  # Apache Airflow - Orchestration
  # ============================================
  airflow-postgres:
    image: postgres:15-alpine
    container_name: novasight-airflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${AIRFLOW_POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: ${AIRFLOW_POSTGRES_DB:-airflow}
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_POSTGRES_USER:-airflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - novasight-network

  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: novasight-airflow:latest
    container_name: novasight-airflow-init
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_POSTGRES_USER:-airflow}:${AIRFLOW_POSTGRES_PASSWORD:-airflow}@airflow-postgres/${AIRFLOW_POSTGRES_DB:-airflow}
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-novasight-airflow-secret-key-must-be-at-least-64-bytes-long-for-security-compliance}
      # Internal API secret key for JWT authentication between executor and API server
      AIRFLOW__CORE__INTERNAL_API_SECRET_KEY: ${AIRFLOW_INTERNAL_API_SECRET:-novasight-internal-api-secret-key-minimum-32-bytes}
      # JWT secret for Task SDK authentication (Airflow 3.x)
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET:-novasight-jwt-secret-key-for-task-sdk-auth}
      # SimpleAuthManager configuration for Airflow 3.x
      AIRFLOW__CORE__AUTH_MANAGER: 'airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager'
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: '${AIRFLOW_USERNAME:-airflow}:Admin'
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS: '${AIRFLOW_USERNAME:-airflow}:${AIRFLOW_PASSWORD:-airflow}'
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: 'true'
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: '/opt/airflow/auth/passwords.txt'
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_PASSWORD:-airflow}
      AIRFLOW_USERNAME: ${AIRFLOW_USERNAME:-airflow}
      AIRFLOW_PASSWORD: ${AIRFLOW_PASSWORD:-airflow}
    volumes:
      - airflow_auth_data:/opt/airflow/auth
    entrypoint: /bin/bash
    command:
      - -c
      - |
        # Ensure auth directory exists and is writable
        mkdir -p /opt/airflow/auth
        chmod 755 /opt/airflow/auth
        # Initialize password file for SimpleAuthManager
        touch /opt/airflow/auth/passwords.txt
        chmod 644 /opt/airflow/auth/passwords.txt
        # Run database migrations
        airflow db migrate
        airflow users create \
          --username $${AIRFLOW_USERNAME} \
          --password $${AIRFLOW_PASSWORD} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@novasight.dev || true
        # Initialize connections
        /opt/airflow/scripts/init-connections.sh || true
    networks:
      - novasight-network

  # Airflow 3.x API Server (replaces webserver in Airflow 3.x)
  airflow-api-server:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: novasight-airflow:latest
    container_name: novasight-airflow-api-server
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      spark-master:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_POSTGRES_USER:-airflow}:${AIRFLOW_POSTGRES_PASSWORD:-airflow}@airflow-postgres/${AIRFLOW_POSTGRES_DB:-airflow}
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-novasight-airflow-secret-key-must-be-at-least-64-bytes-long-for-security-compliance}
      # Internal API secret key for JWT authentication between executor and API server
      AIRFLOW__CORE__INTERNAL_API_SECRET_KEY: ${AIRFLOW_INTERNAL_API_SECRET:-novasight-internal-api-secret-key-minimum-32-bytes}
      # JWT secret for Task SDK authentication (Airflow 3.x)
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET:-novasight-jwt-secret-key-for-task-sdk-auth}
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
      # SimpleAuthManager configuration for Airflow 3.x
      AIRFLOW__CORE__AUTH_MANAGER: 'airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager'
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: '${AIRFLOW_USERNAME:-airflow}:Admin'
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS: '${AIRFLOW_USERNAME:-airflow}:${AIRFLOW_PASSWORD:-airflow}'
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: 'true'
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: '/opt/airflow/auth/passwords.txt'
      # Spark connection environment variables
      SPARK_MASTER_CONTAINER: novasight-spark-master
    volumes:
      - ./infrastructure/airflow/dags:/opt/airflow/dags
      - ./infrastructure/airflow/logs:/opt/airflow/logs
      - ./infrastructure/airflow/plugins:/opt/airflow/plugins
      - airflow_auth_data:/opt/airflow/auth
      - ./infrastructure/spark/jobs:/opt/spark/jobs
      - /var/run/docker.sock:/var/run/docker.sock
    command: api-server
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/version"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - novasight-network

  # Airflow 3.x DAG Processor (new in Airflow 3.x - required)
  airflow-dag-processor:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: novasight-airflow:latest
    container_name: novasight-airflow-dag-processor
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-api-server:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_POSTGRES_USER:-airflow}:${AIRFLOW_POSTGRES_PASSWORD:-airflow}@airflow-postgres/${AIRFLOW_POSTGRES_DB:-airflow}
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-novasight-airflow-secret-key-must-be-at-least-64-bytes-long-for-security-compliance}
      # Internal API secret key for JWT authentication between executor and API server
      AIRFLOW__CORE__INTERNAL_API_SECRET_KEY: ${AIRFLOW_INTERNAL_API_SECRET:-novasight-internal-api-secret-key-minimum-32-bytes}
      # JWT secret for Task SDK authentication (Airflow 3.x)
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET:-novasight-jwt-secret-key-for-task-sdk-auth}
      # SimpleAuthManager configuration for Airflow 3.x
      AIRFLOW__CORE__AUTH_MANAGER: 'airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager'
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: 'true'
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: '/opt/airflow/auth/passwords.txt'
      # Airflow 3.x Execution API Server URL
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-api-server:8080/execution/'
    volumes:
      - ./infrastructure/airflow/dags:/opt/airflow/dags
      - ./infrastructure/airflow/logs:/opt/airflow/logs
      - ./infrastructure/airflow/plugins:/opt/airflow/plugins
      - airflow_auth_data:/opt/airflow/auth
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type DagProcessorJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - novasight-network

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: novasight-airflow:latest
    container_name: novasight-airflow-scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-dag-processor:
        condition: service_healthy
      airflow-api-server:
        condition: service_healthy
      spark-master:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_POSTGRES_USER:-airflow}:${AIRFLOW_POSTGRES_PASSWORD:-airflow}@airflow-postgres/${AIRFLOW_POSTGRES_DB:-airflow}
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-novasight-airflow-secret-key-must-be-at-least-64-bytes-long-for-security-compliance}
      # Internal API secret key for JWT authentication between executor and API server
      AIRFLOW__CORE__INTERNAL_API_SECRET_KEY: ${AIRFLOW_INTERNAL_API_SECRET:-novasight-internal-api-secret-key-minimum-32-bytes}
      # JWT secret for Task SDK authentication (Airflow 3.x)
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET:-novasight-jwt-secret-key-for-task-sdk-auth}
      # SimpleAuthManager configuration for Airflow 3.x
      AIRFLOW__CORE__AUTH_MANAGER: 'airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager'
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: 'true'
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: '/opt/airflow/auth/passwords.txt'
      # Airflow 3.x Execution API Server URL - required for LocalExecutor to communicate with API server
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-api-server:8080/execution/'
      # Spark container for docker exec
      SPARK_MASTER_CONTAINER: novasight-spark-master
    volumes:
      - ./infrastructure/airflow/dags:/opt/airflow/dags
      - ./infrastructure/airflow/logs:/opt/airflow/logs
      - ./infrastructure/airflow/plugins:/opt/airflow/plugins
      - ./infrastructure/spark/jobs:/opt/spark/jobs
      - /var/run/docker.sock:/var/run/docker.sock
      - airflow_auth_data:/opt/airflow/auth
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - novasight-network

  # Airflow 3.x Triggerer (for deferrable tasks)
  airflow-triggerer:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: novasight-airflow:latest
    container_name: novasight-airflow-triggerer
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-api-server:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-novasight-airflow-secret-key-must-be-at-least-64-bytes-long-for-security-compliance}
      # Internal API secret key for JWT authentication between executor and API server
      AIRFLOW__CORE__INTERNAL_API_SECRET_KEY: ${AIRFLOW_INTERNAL_API_SECRET:-novasight-internal-api-secret-key-minimum-32-bytes}
      # JWT secret for Task SDK authentication (Airflow 3.x)
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET:-novasight-jwt-secret-key-for-task-sdk-auth}
      # SimpleAuthManager configuration for Airflow 3.x
      AIRFLOW__CORE__AUTH_MANAGER: 'airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager'
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: 'true'
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: '/opt/airflow/auth/passwords.txt'
      # Airflow 3.x Execution API Server URL - required for triggerer to communicate with API server
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-api-server:8080/execution/'
    volumes:
      - ./infrastructure/airflow/dags:/opt/airflow/dags
      - ./infrastructure/airflow/logs:/opt/airflow/logs
      - ./infrastructure/airflow/plugins:/opt/airflow/plugins
      - airflow_auth_data:/opt/airflow/auth
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type TriggererJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - novasight-network

  # ============================================
  # Apache Spark - Distributed Processing
  # ============================================
  spark-master:
    image: apache/spark:3.5.4
    container_name: novasight-spark-master
    restart: unless-stopped
    ports:
      - "8081:8080"   # Spark Master Web UI
      - "7077:7077"   # Spark Master port
    environment:
      SPARK_NO_DAEMONIZE: "true"
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    volumes:
      - spark_data:/opt/spark/work
      - ./infrastructure/spark/jars:/opt/spark/jars/custom
      - ./infrastructure/spark/jobs:/opt/spark/jobs
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - novasight-network

  spark-worker-1:
    image: apache/spark:3.5.4
    container_name: novasight-spark-worker-1
    restart: unless-stopped
    depends_on:
      - spark-master
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    volumes:
      - ./infrastructure/spark/jars:/opt/spark/jars/custom
      - ./infrastructure/spark/jobs:/opt/spark/jobs
    networks:
      - novasight-network

  spark-worker-2:
    image: apache/spark:3.5.4
    container_name: novasight-spark-worker-2
    restart: unless-stopped
    depends_on:
      - spark-master
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    volumes:
      - ./infrastructure/spark/jars:/opt/spark/jars/custom
      - ./infrastructure/spark/jobs:/opt/spark/jobs
    networks:
      - novasight-network

  # ============================================
  # Ollama - Local LLM
  # ============================================
  ollama:
    image: ollama/ollama:latest
    container_name: novasight-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          memory: 4G
    networks:
      - novasight-network

  # ============================================
  # NovaSight Backend API (with Dagster)
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: novasight-backend
    restart: unless-stopped
    ports:
      - "5000:5000"    # Flask API
      - "3000:3000"    # Dagster Webserver
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: "1"
      DATABASE_URL: postgresql://novasight:novasight@postgres:5432/novasight_platform
      REDIS_URL: redis://redis:6379/0
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 9000
      AIRFLOW_BASE_URL: http://airflow-api-server:8080
      AIRFLOW_USERNAME: airflow
      AIRFLOW_PASSWORD: airflow
      SPARK_MASTER_URL: spark://spark-master:7077
      OLLAMA_BASE_URL: http://ollama:11434
      SECRET_KEY: dev-secret-key-change-in-production
      JWT_SECRET_KEY: jwt-dev-secret-key-change-in-production
      CREDENTIAL_ENCRYPTION_KEY: novasight-encryption-key-32byte!
      # Dagster Configuration (Primary Orchestrator)
      DAGSTER_HOME: /app/orchestration
      DAGSTER_POSTGRES_URL: postgresql://novasight:novasight@postgres:5432/dagster
      DAGSTER_HOST: localhost
      DAGSTER_PORT: 3000
      DAGSTER_GRAPHQL_URL: http://localhost:3000/graphql
      DAGSTER_MAX_CONCURRENT_RUNS: 10
      DAGSTER_SPARK_CONCURRENCY_LIMIT: 3
      DAGSTER_DBT_CONCURRENCY_LIMIT: 2
      DAGSTER_COMPUTE_LOGS_DIR: /var/dagster/logs
      # Dagster resources configuration
      DBT_PROJECT_DIR: /app/dbt
      DBT_PROFILES_DIR: /app/dbt
    volumes:
      - ./backend:/app
      - ./infrastructure/airflow/dags:/opt/airflow/dags
      - ./infrastructure/spark/jobs:/opt/spark/jobs
      - ./dbt:/app/dbt
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - novasight-network

  # ============================================
  # NovaSight Frontend
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: novasight-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - novasight-network

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
    name: novasight-postgres-data
  clickhouse_data:
    name: novasight-clickhouse-data
  redis_data:
    name: novasight-redis-data
  airflow_postgres_data:
    name: novasight-airflow-postgres-data
  airflow_auth_data:
    name: novasight-airflow-auth-data
  spark_data:
    name: novasight-spark-data
  ollama_data:
    name: novasight-ollama-data

# ============================================
# Networks
# ============================================
networks:
  novasight-network:
    name: novasight-network
    driver: bridge
