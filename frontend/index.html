<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Base Meta Tags -->
    <title>NovaSight — AI-Powered Business Intelligence Platform</title>
    <meta name="description" content="Transform raw data into actionable intelligence with NovaSight. Connect 20+ data sources, build automated pipelines, and get AI-powered insights." />
    <meta name="keywords" content="business intelligence, BI platform, data analytics, AI analytics, data visualization" />
    <meta name="author" content="NovaSight" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="NovaSight" />
    <meta property="og:title" content="NovaSight — AI-Powered Business Intelligence Platform" />
    <meta property="og:description" content="Transform raw data into actionable intelligence with AI-powered analytics." />
    <meta property="og:image" content="/og/default.png" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NovaSight — AI-Powered Business Intelligence Platform" />
    <meta name="twitter:description" content="Transform raw data into actionable intelligence with AI-powered analytics." />
    <meta name="twitter:image" content="/og/default.png" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/mobius_strip.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#8b5cf6" />
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Font preloads -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" as="style" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    
    <!-- DNS prefetch for API -->
    <link rel="dns-prefetch" href="//api.novasight.io" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
