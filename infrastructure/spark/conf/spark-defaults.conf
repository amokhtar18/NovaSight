#
# NovaSight Spark Configuration
#

# Oracle JDBC timezone fix (ORA-01882: timezone region not found)
spark.driver.extraJavaOptions    -Duser.timezone=UTC -Doracle.jdbc.timezoneAsRegion=false
spark.executor.extraJavaOptions  -Duser.timezone=UTC -Doracle.jdbc.timezoneAsRegion=false

# JDBC driver paths
spark.jars                       /opt/spark/jars/postgresql-42.7.4.jar,/opt/spark/jars/clickhouse-jdbc-0.6.3.jar,/opt/spark/jars/ojdbc8.jar,/opt/spark/jars/mysql-connector-j-8.2.0.jar,/opt/spark/jars/mssql-jdbc-12.4.2.jre11.jar

# Default memory settings
spark.driver.memory              2g
spark.executor.memory            2g
spark.executor.cores             2
